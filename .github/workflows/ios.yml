name: iOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios-build-and-test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build iPhone target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build watch target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMapsWatch
          -destination 'generic/platform=watchOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Resolve iPhone simulator
        id: simulator
        run: |
          simulator_line=$(xcrun simctl list devices available | awk '/iPhone/ && /Shutdown/ {print; exit}')

          device_name=$(printf '%s\n' "$simulator_line" | awk -F '[()]' '{gsub(/^ +| +$/, "", $1); print $1}')
          device_udid=$(printf '%s\n' "$simulator_line" | awk -F '[()]' '{gsub(/^ +| +$/, "", $2); print $2}')

          if [[ -z "$device_name" || -z "$device_udid" ]]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator: $device_name ($device_udid)"
          echo "device_name=$device_name" >> "$GITHUB_OUTPUT"
          echo "device_udid=$device_udid" >> "$GITHUB_OUTPUT"

      - name: Run iPhone XCTest suite with coverage
        run: >-
          xcodebuild test -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'id=${{ steps.simulator.outputs.device_udid }}'
          -enableCodeCoverage YES
          -resultBundlePath TestResults/CrossCountryMaps.xcresult
          CODE_SIGNING_ALLOWED=NO

      - name: Publish coverage summary
        run: |
          report=$(xcrun xccov view --report TestResults/CrossCountryMaps.xcresult)
          echo "$report"
          {
            echo "## iOS Coverage"
            echo
            echo '```text'
            echo "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$report" | grep -q 'CrossCountryMaps'

      - name: Upload XCTest result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: TestResults/CrossCountryMaps.xcresult
          if-no-files-found: error