name: iOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios-build-and-test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build iPhone target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build watch target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMapsWatch
          -destination 'generic/platform=watchOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Run iPhone XCTest suite with coverage
        run: >-
          xcodebuild test -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -enableCodeCoverage YES
          -resultBundlePath TestResults/CrossCountryMaps.xcresult
          CODE_SIGNING_ALLOWED=NO

      - name: Publish coverage summary
        run: |
          report=$(xcrun xccov view --report TestResults/CrossCountryMaps.xcresult)
          echo "$report"
          {
            echo "## iOS Coverage"
            echo
            echo '```text'
            echo "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$report" | grep -q 'CrossCountryMaps'

      - name: Upload XCTest result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: TestResults/CrossCountryMaps.xcresult
          if-no-files-found: error