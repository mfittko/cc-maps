name: iOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios-build-and-test:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Report Xcode and runtimes
        run: |
          xcodebuild -version
          echo
          xcrun simctl list runtimes available

      - name: Build iPhone target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build watch target
        run: >-
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMapsWatch
          -destination 'generic/platform=watchOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Resolve iPhone simulator
        id: simulator
        run: |
          destinations_file=$(mktemp)
          xcodebuild -project apps/ios/CrossCountryMaps.xcodeproj \
            -scheme CrossCountryMaps \
            -showdestinations > "$destinations_file"

          cat "$destinations_file"

          simulator_line=$(awk '/platform:iOS Simulator/ && /id:/ && $0 !~ /placeholder/ {print; exit}' "$destinations_file")

          device_name=$(printf '%s\n' "$simulator_line" | awk -F '[,:}]' '{for (i = 1; i <= NF; i += 1) if ($i ~ /name/) {gsub(/^ +| +$/, "", $(i + 1)); print $(i + 1)}}')
          device_udid=$(printf '%s\n' "$simulator_line" | awk -F '[,:}]' '{for (i = 1; i <= NF; i += 1) if ($i ~ /id/) {gsub(/^ +| +$/, "", $(i + 1)); print $(i + 1)}}')
          device_os=$(printf '%s\n' "$simulator_line" | awk -F '[,:}]' '{for (i = 1; i <= NF; i += 1) if ($i ~ /OS/) {gsub(/^ +| +$/, "", $(i + 1)); print $(i + 1)}}')

          if [[ -z "$device_name" || -z "$device_udid" ]]; then
            echo "No eligible iPhone simulator destination found for CrossCountryMaps" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator: $device_name ($device_udid) on iOS ${device_os:-unknown}"
          echo "device_name=$device_name" >> "$GITHUB_OUTPUT"
          echo "device_udid=$device_udid" >> "$GITHUB_OUTPUT"

      - name: Run iPhone XCTest suite with coverage
        run: >-
          xcodebuild test -project apps/ios/CrossCountryMaps.xcodeproj
          -scheme CrossCountryMaps
          -destination 'id=${{ steps.simulator.outputs.device_udid }}'
          -enableCodeCoverage YES
          -resultBundlePath TestResults/CrossCountryMaps.xcresult
          CODE_SIGNING_ALLOWED=NO

      - name: Publish coverage summary
        run: |
          report=$(xcrun xccov view --report TestResults/CrossCountryMaps.xcresult)
          echo "$report"
          {
            echo "## iOS Coverage"
            echo
            echo '```text'
            echo "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$report" | grep -q 'CrossCountryMaps'

      - name: Upload XCTest result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: TestResults/CrossCountryMaps.xcresult
          if-no-files-found: error